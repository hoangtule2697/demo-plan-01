    <!-- logic -->
    <script type="text/babel">
      const getFullData = (canLams) => {
        const details = (canLams || []).map((canLam) => {
          const sanPham = sanPhamOpts[canLam.sanPhamCode];
          const tongTienSanPham = sanPham.tienSanPham * canLam.quantity;
          return {
            ...canLam,
            ...sanPham,
            tongTienSanPham,
          };
        });

        const allVatLieu = details
          .map((d) =>
            d.vatLieu.map((vl) => ({
              ...vl,
              quantity: d.quantity * vl.quantity,
              tienVatLieu: d.quantity * vl.tienVatLieu,
            })),
          )
          .flat();

        const chiTietVatLieu = Object.values(
          allVatLieu.reduce((acc, item) => {
            const key = `${item.code}_${item.value}`;

            if (!acc[key]) {
              acc[key] = { ...item, tongTienVatLieu: item.tienVatLieu };
            } else {
              acc[key].quantity += item.quantity;
              acc[key].tongTienVatLieu += item.tienVatLieu;
            }

            return acc;
          }, {}),
        );

        const tongVatLieu = Object.values(
          chiTietVatLieu
            .map((v) => ({ ...v, value: v.quantity * v.value, quantity: 1 }))
            .reduce((acc, item) => {
              const key = `${item.code}`;

              if (!acc[key]) {
                acc[key] = { ...item };
              } else {
                acc[key].tongTienVatLieu += item.tongTienVatLieu;
                acc[key].value += item.value;
              }

              return acc;
            }, {}),
        ).map((v) => ({ ...v, value: Math.round(v.value * 10) / 10 }));

        const tongTien = details.reduce(
          (sum, item) => sum + item.tongTienSanPham,
          0,
        );

        return {
          details,
          tongTien,
          chiTietVatLieu,
          tongVatLieu,
        };
      };

      const getDefaultDanhSachCanLam = () => {
        const { sanPhamData } = store;

        const codeOrder = {};
        sanPhamData.forEach((sp, index) => {
          codeOrder[sp.code] = index;
        });
        const url = utils.url.genParamsFromUrl();
        const dsCanLam = Object.values(
          [
            ...url.danhSachCanLam,
            ...sanPhamData.map((sp) => ({ sanPhamCode: sp.code, quantity: 0 })),
          ].reduce((obj, item) => {
            obj[item.sanPhamCode] ??= {
              ...item,
              quantity: 0,
            };
            obj[item.sanPhamCode].quantity += item.quantity;
            return obj;
          }, {}),
        ).sort((a, b) => codeOrder[a.sanPhamCode] - codeOrder[b.sanPhamCode]);

        return dsCanLam;
      };

      const parseDanhSachCanLam = (danhSachCanLamStr) => {
        if (danhSachCanLamStr && danhSachCanLamStr !== "") {
          try {
            const danhSachCanLam = danhSachCanLamStr.split("~").map((item) => {
              const [sanPhamCode, quantity] = item.split(".");
              return { sanPhamCode, quantity: Number(quantity) };
            });
            return danhSachCanLam;
          } catch (error) {
            console.error("Error parsing danhSachCanLam:", error);
          }
        }
        return [];
      };

      const stringifyDanhSachCanLam = (danhSachCanLam) => {
        if (danhSachCanLam?.length) {
          try {
            const strDscl = danhSachCanLam
              .map((d) => `${d.sanPhamCode}.${d.quantity}`)
              .join("~");
            return strDscl;
          } catch (error) {
            console.error("Error stringifying danhSachCanLam:", error);
          }
        }
        return null;
      };

      var logic = {
        getFullData,
        getDefaultDanhSachCanLam,
        parseDanhSachCanLam,
        stringifyDanhSachCanLam,
      };
    </script>

    <!-- utils -->
    <script type="text/babel">
      function reMapObject(
        list = [],
        key = "code",
        { isArray = false, deleteUndefined = false, noPushNull = false } = {},
      ) {
        let obj = {};
        for (const item of list.filter((i) => i)) {
          if (isArray) {
            obj[item[key]] = obj[item[key]] || [];
            if (noPushNull) {
              if (item[key]) {
                obj[item[key]].push(item);
              }
            } else {
              obj[item[key]].push(item);
            }
          } else {
            obj[item[key]] = item;
          }
        }
        if (deleteUndefined) {
          delete obj["undefined"];
        }
        return obj;
      }

      function randomStr(length = 8) {
        let result = "";
        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const charactersLength = characters.length;
        let counter = 0;
        while (counter < length) {
          result += characters.charAt(
            Math.floor(Math.random() * charactersLength),
          );
          counter += 1;
        }
        return result;
      }

      const getParamsFromUrl = () => {
        const data = Object.fromEntries(
          new URLSearchParams(window.location.search),
        );
        return data;
      };

      const genParamsFromUrl = () => {
        let { danhSachCanLam } = getParamsFromUrl();

        return {
          danhSachCanLam: logic.parseDanhSachCanLam(danhSachCanLam),
        };
      };

      const updateUrlParams = (
        updateParams,
        { isReplace = false, sortPriority = [] } = {},
      ) => {
        try {
          if (!updateParams || !Object.keys(updateParams).length) return;
          const currentUrl = new URL(window.location.href);

          const newParams = {
            ...(isReplace ? {} : getParamsFromUrl()),
            ...updateParams,
          };

          const orderedKeys = [
            ...sortPriority.filter((key) => key in newParams),
            ...Object.keys(newParams).filter(
              (key) => !sortPriority.includes(key),
            ),
          ];

          const searchParams = new URLSearchParams();

          orderedKeys.forEach((key) => {
            const value = newParams[key];

            if (
              value !== null &&
              value !== undefined &&
              value !== "" &&
              value !== "null" &&
              value !== "undefined"
            ) {
              searchParams.set(key, String(value));
            }
          });

          const queryString = searchParams.toString();

          const newUrl =
            currentUrl.origin +
            currentUrl.pathname +
            (queryString ? `?${queryString}` : "");

          window.history.replaceState({}, "", newUrl);
        } catch (error) {}
      };

      const hide = (text) =>
        !(localStorage.getItem("isHide") === "true") ? text : randomStr();
      const displayCurrency = (p) =>
        hide(`${(Math.round(p / 1000) * 1000).toLocaleString("vi-VN")}đ`);

      var utils = {
        object: {
          reMapObject,
        },
        string: {
          randomStr,
        },
        view: {
          displayCurrency,
          hide,
        },
        url: {
          getParamsFromUrl,
          genParamsFromUrl,
          updateUrlParams,
        },
      };
    </script>

    <!-- components -->
    <script type="text/babel">
      function QuantityButton({
        min = 0,
        max = 9999,
        defaultValue = 0,
        onChange,
      }) {
        const clamp = (value) => Math.min(max, Math.max(min, value));

        const [value, setValue] = React.useState(clamp(defaultValue));

        const updateValue = (newValue) => {
          const finalValue = clamp(Number(newValue) || 0);

          setValue(finalValue);

          if (onChange) {
            onChange(finalValue);
          }
        };

        const handleInput = (e) => {
          const text = e.target.value;

          // Cho phép xóa để nhập lại
          if (text === "") {
            setValue("");
            return;
          }

          // Chỉ nhận số
          if (!/^\d+$/.test(text)) {
            return;
          }

          setValue(text);
        };

        const handleBlur = () => {
          updateValue(value);
        };

        return (
          <div className="input-group" style={{ width: 120 }}>
            <button
              className="btn btn-outline-secondary"
              disabled={value <= min}
              onClick={() => updateValue(Number(value) - 1)}
            >
              −
            </button>

            <input
              type="text"
              className="form-control text-center"
              value={value}
              onChange={handleInput}
              onBlur={handleBlur}
            />

            <button
              className="btn btn-outline-secondary"
              disabled={value >= max}
              onClick={() => updateValue(Number(value) + 1)}
            >
              +
            </button>
          </div>
        );
      }

            <div style={{ marginTop: "10px" }}>

          </div>
        );
      };

                        </p>

                      </div>
                    </div>
                  );
                })}
            </div>
          </div>
        );

    </script>

    <!-- render UI -->

            updatedCanLams.filter((u) => u.quantity),
          );

            danhSachCanLam: strDscm,

        const { DanhSachCanLam, ChiTietVatLieu, TongVatLieu, ChiTietSanPham } =

                    updatedCanLams[index].quantity = newQuantity;
                    onChangeDanhSachCanLam(updatedCanLams);

                    onChangeDanhSachCanLam(

              </div>
              <div className="col-4">
                <ChiTietSanPham {...data} />
              </div>
            </div>

            <div
              style={{
                position: "fixed",
                bottom: 0,
                left: 0,
                padding: 20,
                width: "100%",
                textAlign: "end",
                backgroundColor: "#fff",
                boxShadow: "0px -2px 5px rgba(0,0,0,0.1)",
                zIndex: 10,
              }}
            >
              <h2>Tổng cộng: {utils.view.displayCurrency(tongTien)}</h2>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
